<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homely UI</title>
    <link rel="stylesheet" href="style.css">
     <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet"/>
</head>
<body>
    <!-- Commerical Layout  -->
    <main>
        <section class="section1">
            <!-- Header Section -->
            <nav class="header">
                <div class="header-logo">
                    <i class="ri-home-smile-2-fill"></i>
                    <h2>homely</h2>
                </div>

                <div class="header-links">
                    <a href="#">Homepage</a>
                    <a href="#">Mega Menu</a>
                    <a href="#">About</a>
                    <a href="#">Rooms</a>
                    <a href="#">Services</a>
                    <a href="#">Pages 
                    <i class="ri-arrow-down-s-line"></i></a>
                </div>
                <div class="header-button">
                    <button id="login">Login </button>
                    <button id="contact">Contact</button>
                </div>
            </nav>

            <div class="hero-section">
                <div class="left-hero">
                    <div class="left-center">
                        <div class="rating">
                            <i class="ri-star-fill"></i>
                            <div class="rating-text">
                                <h3>4.5  Rating</h3>
                                <span>by New York Times</span>
                            </div>
                        </div>

                        <h1>Find out the
                            Best stav.
                        </h1>

                        <p>Your content goes here. Edit or remove this text inline or in the <strong>module
                            Content settings.</strong> You can also style every aspect of this content in the
                            <strong>module Desian</strong>
                        </p>

                        <div class="hero-btn">
                            <button>Log in</button>
                            <button><i class="ri-arrow-right-circle-line"></i>Get Started</button>
                        </div>
                    </div>
                </div>
                <div class="right-hero">
                    <img src="./Images/home.jpg" alt="home">
                </div>
            </div>
        </section>
    </main>
</body>
</html>
