<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Art Work UI</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet"/>
</head>
<body>
    <main>
        <section class="home-page">
            <h3>See All</h3>
            <span>Explore Art Work</span>
            <div class="card-container">
                
                <div class="card">
                    <div class="card-img">
                        <img src="../Images/monocular_art.png" alt="monocular">
                    </div>
                    <div class="card-text">
                        <div class="text">Monocular</div>
                        <div class="card-likes">
                            54.8k <i class="ri-poker-hearts-line"></i>
                        </div>
                    </div>
                    <div class="card-btn">
                        <button>Place Bid</button>
                    </div>
                </div>

                <div class="card">
                    <div class="card-img">
                        <img src="../Images/Horns Mask.png" alt="Homs Mask">
                    </div>
                    <div class="card-text">
                        <div class="text">Homs Mask</div>
                        <div class="card-likes">
                            32.4k <i class="ri-poker-hearts-line"></i>
                        </div>
                    </div>
                    <div class="card-btn">
                        <button>Place Bid</button>
                    </div>
                </div>

                <div class="card">
                    <div class="card-img">
                        <img src="../Images/Light moon.png" alt="Light moon">
                    </div>
                    <div class="card-text">
                        <div class="text">Light moon</div>
                        <div class="card-likes">
                            86.6k <i class="ri-poker-hearts-line"></i>
                        </div>
                    </div>
                    <div class="card-btn">
                        <button>Place Bid</button>
                    </div>
                </div>

                <div class="card">
                    <div class="card-img">
                        <img src="../Images/skull_wire_art.png" alt="Light moon">
                    </div>
                    <div class="card-text">
                        <div class="text">Skull Wire</div>
                        <div class="card-likes">
                            78.9k <i class="ri-poker-hearts-line"></i>
                        </div>
                    </div>
                    <div class="card-btn">
                        <button>Place Bid</button>
                    </div>
                </div>

                <div class="card">
                    <div class="card-img">
                        <img src="../Images/spiderman_art.png" alt="spiderman">
                    </div>
                    <div class="card-text">
                        <div class="text">Spiderman</div>
                        <div class="card-likes">
                            24.8k <i class="ri-poker-hearts-line"></i>
                        </div>
                    </div>
                    <div class="card-btn">
                        <button>Place Bid</button>
                    </div>
                </div>

                 <div class="card">
                    <div class="card-img">
                        <img src="../Images/deadpool_art.png" alt="deadpool">
                    </div>
                    <div class="card-text">
                        <div class="text">Dead pool</div>
                        <div class="card-likes">
                            56.7k <i class="ri-poker-hearts-line"></i>
                        </div>
                    </div>
                    <div class="card-btn">
                        <button>Place Bid</button>
                    </div>
                </div>

                <div class="card">
                    <div class="card-img">
                        <img src="../Images/white_eye_art.png" alt="white-eye">
                    </div>
                    <div class="card-text">
                        <div class="text">White Eye</div>
                        <div class="card-likes">
                            48.7k <i class="ri-poker-hearts-line"></i>
                        </div>
                    </div>
                    <div class="card-btn">
                        <button>Place Bid</button>
                    </div>
                </div>

                <div class="card">
                    <div class="card-img">
                        <img src="../Images/plastic_spinal_art.png" alt="plastic-spinal">
                    </div>
                    <div class="card-text">
                        <div class="text">Plastic Spinal</div>
                        <div class="card-likes">
                            96.6k <i class="ri-poker-hearts-line"></i>
                        </div>
                    </div>
                    <div class="card-btn">
                        <button>Place Bid</button>
                    </div>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
