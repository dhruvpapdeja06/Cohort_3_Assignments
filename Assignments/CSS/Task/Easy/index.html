<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pikachu UI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section>
        <div class="card">
            <div class="left">
                <div class="logo">
                    <img src="../Images/pokemon_logo.png" alt="logo">
                </div>
                <h5>POKEMON GEN |</h5>
                <h1>Pikachu</h1>
                <pre>Pikachu is an Electric-type Pokémon introduced 
                    in Generation I. Pikachu are small, chubby 
                    and incredibly cute mouse-like Pokémon.
                    They are almost completely covered by 
                    yellow fur.
                </pre>
                <div class="line"></div>
                <div class="page-no">01/08</div>

                <div class="circle">
                    <div class="circle-line"></div>
                    <div class="inner-circle"></div>
                </div>
                
            </div>

            <div class="right">
                <div class="icon">
                    <img src="../Images/Hamburger_icon.png" alt="Hamburger icon">
                </div>
                <img  id="pikachu" src="../Images/pikachu.png" alt="pikachu">

                <div class="dot active"></div>
                <div class="dot dot2"></div>
                <div class="dot dot3"></div>
                <div class="dot dot4"></div>
                <div class="dot dot5"></div>
            </div>
        </div>
    </section>
    
</body>
</html>
